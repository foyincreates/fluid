services:
  # Stellar Quickstart — isolated local network for sandbox testing
  # Exposes Horizon on :8000 and Friendbot on :8000/friendbot
  stellar-quickstart:
    image: stellar/quickstart:latest
    container_name: fluid-stellar-quickstart
    command: ["--standalone", "--enable-soroban-rpc"]
    ports:
      - "8000:8000"
    environment:
      NETWORK: standalone
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fluid-network
  postgres:
    image: postgres:15-alpine
    container_name: fluid-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-fluid}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-fluid_pass}"
      POSTGRES_DB: "${POSTGRES_DB:-fluid_db}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fluid} -d ${POSTGRES_DB:-fluid_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fluid-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fluid-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fluid-network
    restart: unless-stopped

  rust-engine:
    build:
      context: ./fluid-server
      dockerfile: Dockerfile
    container_name: fluid-rust-engine
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-fluid}:${POSTGRES_PASSWORD:-fluid_pass}@postgres:5432/${POSTGRES_DB:-fluid_db}"
      FLUID_FEE_PAYER_SECRET: "${FLUID_FEE_PAYER_SECRET}"
      STELLAR_HORIZON_URL: "${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}"
      STELLAR_NETWORK_PASSPHRASE: "${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      FLUID_BASE_FEE: "${FLUID_BASE_FEE:-100}"
      FLUID_FEE_MULTIPLIER: "${FLUID_FEE_MULTIPLIER:-2.0}"
      FLUID_HORIZON_SELECTION: "${FLUID_HORIZON_SELECTION:-priority}"
      FLUID_RATE_LIMIT_WINDOW_MS: "${FLUID_RATE_LIMIT_WINDOW_MS:-60000}"
      FLUID_RATE_LIMIT_MAX: "${FLUID_RATE_LIMIT_MAX:-5}"
      FLUID_ALLOWED_ORIGINS: "${FLUID_ALLOWED_ORIGINS:-*}"
      PORT: "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluid-network
    restart: unless-stopped

  # PgBouncer multiplexes thousands of short-lived app connections into a small
  # Postgres server-side pool, preventing connection exhaustion under high load
  # or serverless/multi-replica deployments.
  # Pool mode: transaction — compatible with Prisma (use ?pgbouncer=true in URL).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: fluid-pgbouncer
    environment:
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-fluid}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-fluid_pass}"
      DB_NAME: "${POSTGRES_DB:-fluid_db}"
      POOL_MODE: "transaction"
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "2"
      AUTH_TYPE: "plain"
      SERVER_IDLE_TIMEOUT: "600"
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-fluid} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fluid-network

  node-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fluid-node-api
    environment:
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
      # Connect through PgBouncer (port 6432) instead of Postgres directly.
      # The ?pgbouncer=true flag disables Prisma's prepared statements, which
      # are incompatible with PgBouncer transaction-mode pooling.
      DATABASE_URL: "postgres://${POSTGRES_USER:-fluid}:${POSTGRES_PASSWORD:-fluid_pass}@pgbouncer:6432/${POSTGRES_DB:-fluid_db}?pgbouncer=true"
      FLUID_FEE_PAYER_SECRET: "${FLUID_FEE_PAYER_SECRET}"
      STELLAR_HORIZON_URL: "${STELLAR_HORIZON_URL:-https://horizon-testnet.stellar.org}"
      STELLAR_NETWORK_PASSPHRASE: "${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}"
      FLUID_BASE_FEE: "${FLUID_BASE_FEE:-100}"
      FLUID_FEE_MULTIPLIER: "${FLUID_FEE_MULTIPLIER:-2.0}"
      FLUID_ALLOWED_ORIGINS: "${FLUID_ALLOWED_ORIGINS:-*}"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      stellar-quickstart:
        condition: service_healthy
    networks:
      - fluid-network
    restart: unless-stopped

  dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: fluid-dashboard
    environment:
      PORT: "3002"
      AUTH_SECRET: "${AUTH_SECRET:-random_secret_for_dev_only}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@fluid.dev}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3002}"
      FLUID_SERVER_URL: "http://rust-engine:3000"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      rust-engine:
        condition: service_healthy
    networks:
      - fluid-network
    restart: unless-stopped

networks:
  fluid-network:
    driver: bridge
    name: fluid-network

volumes:
  postgres_data:
    name: fluid-postgres-data